<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>School Admission</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .apply-btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 18px;
            color: white;
            background: #4e73df;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .apply-btn:hover {
            background: #2e59d9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>School Admission 2026</h1>
        <p>Click below to apply online</p>
        
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdZ-vSdhSkN9skt54CCDWZS085YmQnQBZSd_Y0rCW6JyqBa6A/viewform?usp=dialog" target="_blank" class="apply-btn">
            Apply Now
        </a>
    </div>

</body>
</html>
